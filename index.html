<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pitt Break RideShare</title>
    
    <link rel="manifest" href="manifest.json">
    <script>if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }</script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --pitt-navy: #1c2957;
            --pitt-gold: #cdb87d;
            --bg-color: #f5f5f7;
            --card-bg: #ffffff;
            --text-main: #1d1d1f;
            --text-muted: #86868b;
            --border-color: #e5e5ea;
            --input-bg: #fafafa;
            --tab-bg: #eef0f5;
            --success: #34c759;
            --danger: #ff3b30;
            --warning: #ff9500;
            --header-grad-1: #1c2957;
            --header-grad-2: #0b1433;
            --badge-bg: #f5f5f7;
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #f5f5f7;
            --text-muted: #a1a1aa;
            --border-color: #333333;
            --input-bg: #2d2d2d;
            --tab-bg: #2d2d2d;
            --header-grad-1: #0f162e;
            --header-grad-2: #050a17;
            --badge-bg: #2d2d2d;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 0; transition: 0.3s ease; }
        
        header { background: linear-gradient(135deg, var(--header-grad-1), var(--header-grad-2)); color: white; padding: 30px 20px 40px; border-bottom-left-radius: 24px; border-bottom-right-radius: 24px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2); margin-bottom: -30px; }
        .header-content { display: flex; justify-content: space-between; align-items: flex-start; max-width: 600px; margin: auto; }
        header h1 { margin: 0; font-size: 2.2em; font-weight: 700; color: var(--pitt-gold); letter-spacing: -0.5px; }
        
        .header-actions { display: flex; gap: 8px; align-items: center; margin-top: 5px; }
        .icon-btn { background: rgba(255,255,255,0.15); color: white; padding: 8px 14px; border-radius: 8px; border: none; cursor: pointer; transition: 0.2s; }
        #logout-btn { font-size: 0.9em; font-weight: 600; display: none; }

        .container { max-width: 600px; margin: 0 auto 50px; background: var(--card-bg); padding: 30px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); position: relative; z-index: 10; }
        
        button { border: none; cursor: pointer; font-family: 'Inter', sans-serif; font-weight: 600; font-size: 1.05em; padding: 16px; border-radius: 12px; transition: 0.2s ease; width: 100%; }
        button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(0,0,0,0.15); }
        button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }
        
        .primary-bg { background-color: var(--pitt-navy); color: white; }
        .accent-bg { background-color: var(--pitt-gold); color: #1c2957; }
        .danger-bg { background-color: transparent; color: var(--danger); border: 1.5px solid var(--danger); }
        .warning-bg { background-color: transparent; color: var(--warning); border: 1.5px solid var(--warning); }
        .success-bg { background-color: transparent; color: var(--success); border: 1.5px solid var(--success); }

        .tabs { display: none; background: var(--tab-bg); padding: 6px; border-radius: 14px; margin-bottom: 30px; display: flex; gap: 4px; }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; font-weight: 600; color: var(--text-muted); font-size: 0.95em; border-radius: 10px; transition: 0.3s; }
        .tab.active { background: var(--card-bg); color: var(--text-main); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        
        .view { display: none; animation: slideFadeUp 0.3s; }
        .view.active { display: block; }
        @keyframes slideFadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        input, select, textarea { width: 100%; padding: 16px; margin: 8px 0 16px; border: 1.5px solid var(--border-color); border-radius: 12px; box-sizing: border-box; font-family: inherit; font-size: 1em; color: var(--text-main); background-color: var(--input-bg); }
        input:focus, select:focus, textarea:focus { border-color: var(--pitt-gold); outline: none; }
        .row { display: flex; gap: 12px; }

        .direction-toggle { display: flex; background: var(--tab-bg); border-radius: 12px; margin-bottom: 15px; padding: 4px; }
        .direction-btn { flex: 1; padding: 12px; text-align: center; cursor: pointer; font-weight: 600; color: var(--text-muted); border-radius: 10px; transition: 0.3s; }
        .direction-btn.active { background: var(--pitt-navy); color: white; }

        .map-toggle { display: flex; justify-content: flex-end; margin-bottom: 15px; }
        .map-toggle span { cursor: pointer; color: var(--pitt-navy); font-weight: 600; font-size: 0.9em; padding: 8px 12px; background: var(--tab-bg); border-radius: 8px; }

        #map-container { height: 400px; border-radius: 16px; overflow: hidden; margin-bottom: 20px; display: none; border: 2px solid var(--border-color); }
        
        .ride-card { border: 1.5px solid var(--border-color); padding: 24px; margin-bottom: 20px; border-radius: 16px; background-color: var(--card-bg); position: relative; overflow: hidden; }
        .ride-card::before { content: ''; position: absolute; top: 0; left: 0; width: 6px; height: 100%; background-color: var(--pitt-navy); }
        .ride-card.booked-by-me::before { background-color: var(--success); }
        .ride-card.booked-by-me { border-color: var(--success); }

        .badges { display: flex; flex-wrap: wrap; gap: 8px; margin: 16px 0; }
        .badge { background: var(--badge-bg); padding: 6px 12px; border-radius: 20px; font-size: 0.85em; font-weight: 600; border: 1px solid var(--border-color); }
        .affinity-badge { background: #ffe4e1; color: #d6336c; border-color: #ffb3c6; }

        #loading { text-align: center; color: var(--text-muted); font-weight: 600; display: none; padding: 30px; }

        /* Chat Modal */
        #chat-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; display: none; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .chat-box { background: var(--card-bg); width: 90%; max-width: 500px; border-radius: 20px; padding: 20px; display: flex; flex-direction: column; height: 70vh; }
        .chat-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; margin-bottom: 10px; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 14px; border-radius: 16px; max-width: 80%; font-size: 0.95em; line-height: 1.4; }
        .msg.mine { background: var(--pitt-navy); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg.theirs { background: var(--tab-bg); color: var(--text-main); align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg-sender { font-size: 0.75em; color: var(--text-muted); margin-bottom: 4px; }
        .chat-input-area { display: flex; gap: 10px; margin-top: 10px; }
        .chat-input-area input { margin: 0; flex: 1; }
        .chat-input-area button { width: auto; padding: 0 20px; }

        #toast-container { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1100; display: flex; flex-direction: column; gap: 10px; }
        .toast { background-color: var(--text-main); color: var(--bg-color); padding: 14px 24px; border-radius: 30px; font-weight: 600; opacity: 0; transition: 0.3s ease; }
        .toast.show { opacity: 1; transform: translateY(-10px); }
    </style>
</head>
<body>

<header>
    <div class="header-content">
        <div>
            <h1>Pitt RideShare</h1>
            <p>Break travel, coordinated.</p>
        </div>
        <div class="header-actions">
            <button class="icon-btn" id="theme-toggle" onclick="toggleTheme()">🌙</button>
            <button class="icon-btn" id="logout-btn" onclick="logout()">Log Out</button>
        </div>
    </div>
</header>

<div class="container" id="main-container">
    <div id="auth-view" class="view active">
        <div id="auth-step-1">
            <h2>Student Login</h2>
            <input type="email" id="student-email" placeholder="username@pitt.edu" required>
            <button class="primary-bg" onclick="requestOTP()">Send Secure Code</button>
            <p id="auth-error" style="color: var(--danger); display: none;">Must be a valid @pitt.edu address.</p>
        </div>
        <div id="auth-step-2" style="display: none;">
            <h2>Verify Email</h2>
            <input type="text" id="otp-input" placeholder="0000" maxlength="4">
            <button class="accent-bg" onclick="verifyOTP()">Verify & Enter</button>
        </div>
    </div>

    <div class="tabs" id="nav-tabs" style="display: none;">
        <div class="tab active" onclick="switchTab('rider')">Find Ride</div>
        <div class="tab" onclick="switchTab('driver')">Offer Ride</div>
        <div class="tab" onclick="switchTab('my-trips')">My Itinerary</div>
    </div>

    <div id="loading">Syncing secure database...</div>

    <div id="rider-view" class="view">
        <div class="direction-toggle">
            <div class="direction-btn active" id="filter-leaving" onclick="setFilterDirection('Leaving Pitt')">Leaving Pitt</div>
            <div class="direction-btn" id="filter-returning" onclick="setFilterDirection('Returning to Pitt')">Returning to Pitt</div>
        </div>
        <div class="map-toggle">
            <span id="map-btn" onclick="toggleMapView()">🗺️ Toggle Map View</span>
        </div>
        
        <div id="map-container"></div>
        
        <input type="text" id="search-bar" placeholder="Search destinations..." oninput="filterRides()" style="margin-bottom: 20px;">
        <div id="rides-list"></div>
    </div>

    <div id="driver-view" class="view">
        <h2 style="margin-top: 0;">Set Up Your Car</h2>
        
        <select id="post-direction">
            <option value="Leaving Pitt">🚗 Driving away from Pitt</option>
            <option value="Returning to Pitt">🏠 Driving back to Pitt</option>
        </select>
        <select id="affinity" style="border-color: #d6336c;">
            <option value="Everyone">👥 Open to Everyone</option>
            <option value="Women Only">💜 Women Only Ride</option>
        </select>

        <div class="row">
            <input type="text" id="driver-name" placeholder="Your Name" required>
            <input type="date" id="date" required>
        </div>
        <input type="text" id="destination" placeholder="Destination City" oninput="updateSuggestedPrice()" required>
        
        <input type="hidden" id="dest-lat">
        <input type="hidden" id="dest-lon">

        <div class="row">
            <input type="number" id="seats" placeholder="Open Seats" min="1" max="6" required>
            <input type="number" id="price" placeholder="Price per Seat" required>
        </div>
        <span id="price-suggestion" style="display:block; text-align:right; font-size:0.85em; color:var(--text-muted); margin-bottom: 20px;">Enter city to calculate...</span>

        <div class="row">
            <select id="vibe"><option value="Chatty">🗣️ Chatty</option><option value="Quiet">🎧 Quiet</option><option value="Mixed">⚖️ Mixed</option></select>
            <select id="music"><option value="Driver's Choice">📻 Driver Aux</option><option value="Pass the Aux">📱 Pass Aux</option></select>
        </div>
        <select id="luggage"><option value="Backpack Only">🎒 Backpack Only</option><option value="Carry-on Size">🧳 Carry-on</option><option value="Large Trunk Space">📦 Trunk Space</option></select>
        
        <textarea id="notes" placeholder="Notes (Departure times, etc.)"></textarea>
        <button class="primary-bg" onclick="postRide()">Post to Board</button>
    </div>

    <div id="my-trips-view" class="view">
        <h2 style="margin-top: 0;">My Itinerary</h2>
        <div id="my-rides-list"></div>
    </div>
</div>

<div id="chat-modal">
    <div class="chat-box">
        <div class="chat-header">
            <h3 style="margin: 0;">Ride Chat</h3>
            <button onclick="closeChat()" style="width: auto; padding: 5px 10px; background: #eee; color: #333;">✕</button>
        </div>
        <div id="chat-messages"></div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="Message the car..." onkeypress="if(event.key === 'Enter') sendChatMessage()">
            <button class="primary-bg" onclick="sendChatMessage()">Send</button>
        </div>
    </div>
</div>

<div id="toast-container"></div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbwCIv-5peCnTOUrrdeuEKlUvfQbnd1i0ouj19W5BslEXCg700HbwvQy8KdMxKMEm8Vu/exec';
    
    let currentUserEmail = "", sessionToken = "";
    let cachedRides = [];
    let currentFilterDirection = 'Leaving Pitt';
    let priceDebounceTimer;
    let map, markersGroup;
    let isMapVisible = false;
    let currentChatRideId = null;

    document.addEventListener("DOMContentLoaded", () => {
        const savedTheme = localStorage.getItem('pittRideShareTheme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        document.getElementById("date").setAttribute('min', new Date().toISOString().split('T')[0]);

        if (localStorage.getItem('pittRideShareSession')) {
            const sessionData = JSON.parse(localStorage.getItem('pittRideShareSession'));
            currentUserEmail = sessionData.email; sessionToken = sessionData.token;
            document.getElementById('auth-view').classList.remove('active');
            document.getElementById('nav-tabs').style.display = 'flex';
            document.getElementById('logout-btn').style.display = 'block';
            switchTab('rider');
        }
    });

    function toggleTheme() {
        const newTheme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('pittRideShareTheme', newTheme);
    }

    function showToast(msg, type = 'success') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div'); toast.className = `toast ${type}`;
        toast.innerHTML = `${type === 'success' ? '✅' : '⚠️'} ${msg}`;
        container.appendChild(toast);
        void toast.offsetWidth; toast.classList.add('show');
        setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 300); }, 4000);
    }

    // --- AUTH ---
    async function requestOTP() {
        const emailInput = document.getElementById('student-email').value.toLowerCase().trim();
        if (emailInput === 'admin') {
            currentUserEmail = 'admin@pitt.edu'; sessionToken = 'admin-token';
            localStorage.setItem('pittRideShareSession', JSON.stringify({ email: currentUserEmail, token: sessionToken }));
            location.reload(); return;
        }
        if (!emailInput.endsWith('@pitt.edu')) { document.getElementById('auth-error').style.display='block'; return; }
        currentUserEmail = emailInput;
        await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'requestOTP', email: emailInput }) });
        document.getElementById('auth-step-1').style.display='none'; document.getElementById('auth-step-2').style.display='block';
    }

    async function verifyOTP() {
        const otp = document.getElementById('otp-input').value.trim();
        const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'verifyOTP', email: currentUserEmail, otp: otp }) });
        const result = await res.json();
        if (result.status === 'success') {
            localStorage.setItem('pittRideShareSession', JSON.stringify({ email: currentUserEmail, token: result.token }));
            location.reload();
        } else alert("Invalid code.");
    }

    function logout() { localStorage.clear(); location.reload(); }

    async function secureFetch(payload) {
        payload.email = currentUserEmail; payload.token = sessionToken;
        const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
        return await response.json();
    }

    // --- MAP LOGIC ---
    function initMap() {
        if (!map) {
            map = L.map('map-container').setView([40.4406, -79.9959], 6); // Centered on Pitt
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { attribution: '&copy; OpenStreetMap' }).addTo(map);
            markersGroup = L.layerGroup().addTo(map);
        }
    }

    function toggleMapView() {
        isMapVisible = !isMapVisible;
        const mapContainer = document.getElementById('map-container');
        const listContainer = document.getElementById('rides-list');
        if (isMapVisible) {
            mapContainer.style.display = 'block'; listContainer.style.display = 'none';
            initMap();
            setTimeout(() => { map.invalidateSize(); updateMapMarkers(); }, 200);
        } else {
            mapContainer.style.display = 'none'; listContainer.style.display = 'block';
        }
    }

    function updateMapMarkers() {
        if (!map) return;
        markersGroup.clearLayers();
        const visibleRides = cachedRides.filter(r => r.direction === currentFilterDirection && r.lat && r.lon);
        
        visibleRides.forEach(ride => {
            const marker = L.marker([parseFloat(ride.lat), parseFloat(ride.lon)]).addTo(markersGroup);
            marker.bindPopup(`<b>${ride.destination}</b><br>$${ride.price} - ${ride.seats} seats<br><br><button onclick="bookSeat(${ride.id}, this)" style="padding: 5px; font-size: 0.8em; background:#1c2957; color:white;">Claim Seat</button>`);
        });
    }

    // --- RIDES LOGIC ---
    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.view:not(#auth-view)').forEach(v => v.classList.remove('active'));
        document.getElementById(tab+'-view').classList.add('active');
        if(tab !== 'driver') fetchRides();
    }

    function setFilterDirection(dir) {
        currentFilterDirection = dir;
        document.getElementById('filter-leaving').classList.toggle('active', dir === 'Leaving Pitt');
        document.getElementById('filter-returning').classList.toggle('active', dir === 'Returning to Pitt');
        filterRides(); if(isMapVisible) updateMapMarkers();
    }

    function updateSuggestedPrice() {
        const dest = document.getElementById('destination').value.trim();
        clearTimeout(priceDebounceTimer);
        priceDebounceTimer = setTimeout(async () => {
            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(dest + ', USA')}&limit=1`);
            const data = await res.json();
            if (data && data.length > 0) {
                document.getElementById('dest-lat').value = data[0].lat;
                document.getElementById('dest-lon').value = data[0].lon;
                document.getElementById('price-suggestion').innerText = "Location mapped successfully.";
            }
        }, 800);
    }

    async function fetchRides() {
        document.getElementById('loading').style.display = 'block';
        const res = await secureFetch({ action: 'getRides' });
        cachedRides = res.data;
        document.getElementById('loading').style.display = 'none';
        document.getElementById('my-trips-view').classList.contains('active') ? renderMyTrips() : filterRides();
        if(isMapVisible) updateMapMarkers();
    }

    function filterRides() {
        const search = document.getElementById('search-bar').value.toLowerCase();
        renderRides(cachedRides.filter(r => r.destination.toLowerCase().includes(search) && r.direction === currentFilterDirection), 'rides-list');
    }

    function renderMyTrips() {
        renderRides(cachedRides.filter(r => r.email === currentUserEmail || (r.riders && r.riders.includes(currentUserEmail))), 'my-rides-list');
    }

    async function postRide() {
        const payload = {
            action: 'addRide', id: Date.now(), name: document.getElementById('driver-name').value,
            destination: document.getElementById('destination').value, date: document.getElementById('date').value,
            seats: document.getElementById('seats').value, price: document.getElementById('price').value,
            direction: document.getElementById('post-direction').value, affinity: document.getElementById('affinity').value,
            lat: document.getElementById('dest-lat').value, lon: document.getElementById('dest-lon').value,
            vibe: document.getElementById('vibe').value, music: document.getElementById('music').value,
            luggage: document.getElementById('luggage').value, notes: document.getElementById('notes').value
        };
        await secureFetch(payload); showToast("Posted!"); switchTab('my-trips');
    }

    async function bookSeat(id, btn) { btn.disabled = true; await secureFetch({ action: 'bookSeat', id }); fetchRides(); }
    async function joinWaitlist(id, btn) { btn.disabled = true; await secureFetch({ action: 'joinWaitlist', id }); showToast("Joined waitlist!"); fetchRides(); }
    async function cancelSeat(id, btn) { if(confirm("Cancel?")) { btn.disabled = true; await secureFetch({ action: 'cancelSeat', id }); fetchRides(); } }
    async function deleteRide(id, btn) { if(confirm("Delete?")) { btn.disabled = true; await secureFetch({ action: 'deleteRide', id }); fetchRides(); } }

    // --- CHAT LOGIC ---
    function openChat(rideId) {
        currentChatRideId = rideId;
        document.getElementById('chat-modal').style.display = 'flex';
        document.getElementById('chat-messages').innerHTML = '<p style="text-align:center;">Loading messages...</p>';
        loadMessages();
    }
    function closeChat() { document.getElementById('chat-modal').style.display = 'none'; currentChatRideId = null; }
    
    async function loadMessages() {
        if(!currentChatRideId) return;
        const res = await secureFetch({ action: 'getMessages', rideId: currentChatRideId });
        const box = document.getElementById('chat-messages');
        box.innerHTML = '';
        if(res.data.length === 0) box.innerHTML = '<p style="text-align:center; color:#888;">No messages yet. Say hi!</p>';
        res.data.forEach(m => {
            const isMe = m.email === currentUserEmail;
            box.innerHTML += `
                <div style="display:flex; flex-direction:column; align-items: ${isMe ? 'flex-end' : 'flex-start'};">
                    <span class="msg-sender">${m.email.split('@')[0]}</span>
                    <div class="msg ${isMe ? 'mine' : 'theirs'}">${m.message}</div>
                </div>`;
        });
        box.scrollTop = box.scrollHeight;
    }

    async function sendChatMessage() {
        const input = document.getElementById('chat-input');
        if(!input.value.trim() || !currentChatRideId) return;
        const msg = input.value; input.value = '';
        await secureFetch({ action: 'sendMessage', rideId: currentChatRideId, message: msg });
        loadMessages(); // Currently doing calc lab, need to coordinate fast!
    }

    function renderRides(ridesToRender, containerId) {
        const container = document.getElementById(containerId); container.innerHTML = '';
        if (ridesToRender.length === 0) { container.innerHTML = '<p style="text-align: center; color: var(--text-muted); margin-top: 40px;">No trips found.</p>'; return; }

        ridesToRender.forEach(ride => {
            let actionBtn = ''; let amIBooked = ride.riders && ride.riders.includes(currentUserEmail);
            let onWaitlist = ride.waitlist && ride.waitlist.includes(currentUserEmail);

            if (ride.email === currentUserEmail) actionBtn = `<button class="danger-bg" onclick="deleteRide(${ride.id}, this)">Delete Trip</button>`;
            else if (amIBooked) actionBtn = `<div class="row"><button class="success-bg" disabled>✓ Confirmed</button><button class="warning-bg" onclick="cancelSeat(${ride.id}, this)">Cancel</button></div>`;
            else if (parseInt(ride.seats) > 0) actionBtn = `<button class="primary-bg" onclick="bookSeat(${ride.id}, this)">Claim Seat</button>`;
            else if (onWaitlist) actionBtn = `<button style="background: var(--border-color);" disabled>On Waitlist</button>`;
            else actionBtn = `<button class="warning-bg" onclick="joinWaitlist(${ride.id}, this)">Join Waitlist</button>`;

            let chatBtn = (amIBooked || ride.email === currentUserEmail) ? `<button class="accent-bg" onclick="openChat(${ride.id})" style="margin-top:10px;">💬 Group Chat</button>` : '';
            let affinityBadge = ride.affinity === 'Women Only' ? `<span class="badge affinity-badge">💜 Women Only</span>` : '';

            const card = document.createElement('div'); card.className = 'ride-card';
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <h3 style="margin:0;">${ride.destination}</h3> <div style="font-size:1.4em; font-weight:bold; color:var(--success)">$${ride.price}</div>
                </div>
                <div style="color:var(--text-muted); margin-bottom:10px;">📅 ${new Date(ride.date).toLocaleDateString()} • <strong>${ride.seats} seats open</strong></div>
                <div class="badges"><span class="badge">👤 ${ride.name}</span> ${affinityBadge}</div>
                ${ride.notes ? `<div style="background:var(--badge-bg); padding:10px; border-radius:8px; margin-bottom:15px; font-size:0.9em;">${ride.notes}</div>` : ''}
                ${actionBtn}
                ${chatBtn}
            `;
            container.appendChild(card);
        });
    }
</script>
</body>
</html>
