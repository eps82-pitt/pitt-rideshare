<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta http-equiv="Content-Security-Policy"
content="
default-src 'self' https://unpkg.com https://fonts.googleapis.com https://fonts.gstatic.com https://*.basemaps.cartocdn.com https://nominatim.openstreetmap.org https://script.google.com https://script.googleusercontent.com;
connect-src 'self' https://script.google.com https://script.googleusercontent.com https://nominatim.openstreetmap.org;
style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com;
script-src 'self' https://unpkg.com;
img-src 'self' data: https://*.basemaps.cartocdn.com;
">

<title>Pitt RideShare</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
:root{
--bg:#f5f5f7;
--card:#ffffff;
--text:#1d1d1f;
--muted:#6e6e73;
--accent:#1c2957;
--gold:#cdb87d;
--border:#e5e5ea;
--radius:22px;
--shadow:0 8px 30px rgba(0,0,0,0.05);
--shadow-hover:0 14px 40px rgba(0,0,0,0.08);
}

body{
margin:0;
font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
background:var(--bg);
color:var(--text);
}

header{
position:sticky;
top:0;
background:rgba(255,255,255,0.8);
backdrop-filter:blur(20px);
padding:20px;
font-weight:700;
font-size:1.2rem;
border-bottom:1px solid var(--border);
z-index:50;
}

.container{
max-width:640px;
margin:0 auto;
padding:20px;
}

.section-title{
font-size:1.6rem;
font-weight:700;
margin-bottom:4px;
}

.section-sub{
color:var(--muted);
font-size:0.9rem;
margin-bottom:20px;
}

.card{
background:var(--card);
border-radius:var(--radius);
padding:22px;
margin-bottom:16px;
box-shadow:var(--shadow);
transition:all .25s ease;
border:1px solid var(--border);
}

.card:hover{
transform:translateY(-3px);
box-shadow:var(--shadow-hover);
}

input,select,textarea{
width:100%;
padding:14px;
border-radius:14px;
border:1px solid var(--border);
margin-bottom:12px;
font-size:1rem;
background:#fff;
}

button{
padding:14px 20px;
border-radius:16px;
border:none;
background:var(--accent);
color:white;
font-weight:600;
cursor:pointer;
transition:.2s;
}

button.secondary{
background:#f2f2f7;
color:var(--text);
}

button:disabled{
opacity:.6;
cursor:not-allowed;
}

.capacity{
height:6px;
background:var(--border);
border-radius:6px;
overflow:hidden;
margin:12px 0;
}

.capacity-fill{
height:100%;
background:var(--gold);
}

.nav{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:rgba(255,255,255,0.9);
backdrop-filter:blur(20px);
border-radius:20px;
display:flex;
gap:20px;
padding:12px 24px;
box-shadow:var(--shadow);
border:1px solid var(--border);
}

.nav button{
background:none;
color:var(--muted);
font-weight:500;
}

.nav button.active{
color:var(--accent);
font-weight:700;
}

.empty{
text-align:center;
color:var(--muted);
padding:40px 0;
}

.fade{
animation:fade .3s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

</style>
</head>

<body>

<header>Pitt RideShare</header>

<div class="container">

<div id="auth-view">

<h2 class="section-title">Student Access</h2>
<p class="section-sub">Verified Pitt email required</p>

<div class="card">
<input type="email" id="email" placeholder="username@pitt.edu">
<input type="password" id="pass" placeholder="Password">
<button onclick="submitAuth()">Continue</button>
</div>

</div>

<div id="rider-view" style="display:none;">

<h2 class="section-title">Available Rides</h2>
<p class="section-sub" id="last-updated"></p>

<div id="rides"></div>

</div>

</div>

<div class="nav" id="menu" style="display:none;">
<button class="active" onclick="showRides()">Rides</button>
<button onclick="logout()">Logout</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const API="https://script.google.com/macros/s/AKfycbzU3KecA5CBqg5ywqMDfzNrX1DOJV8JZYUUDU5hFgGYApZ0MLEpEKdzf9WoC_md8Ybx/exec";

let session=JSON.parse(localStorage.getItem('sess')||"null");
let rides=[];
let lastSync=0;

async function submitAuth(){
const em=document.getElementById("email").value.trim();
const pw=document.getElementById("pass").value;
if(!em||!pw)return alert("Fill fields");

const btn=event.target;
btn.disabled=true;
btn.innerText="Loading...";

try{
const r=await fetch(API,{method:"POST",body:JSON.stringify({action:"login",email:em,password:pw})});
const d=await r.json();
if(d.status==="success"){
session={email:em,token:d.token};
localStorage.setItem("sess",JSON.stringify(session));
initApp();
}else alert(d.message);
}catch{alert("Network error");}

btn.disabled=false;
btn.innerText="Continue";
}

function logout(){
localStorage.clear();
location.reload();
}

function initApp(){
document.getElementById("auth-view").style.display="none";
document.getElementById("rider-view").style.display="block";
document.getElementById("menu").style.display="flex";
loadRides(true);
setInterval(()=>loadRides(),15000);
}

async function loadRides(force=false){
if(!force && Date.now()-lastSync<10000)return;

try{
const r=await fetch(API,{method:"POST",body:JSON.stringify({action:"getRides",token:session.token})});
const d=await r.json();
if(d.status==="success"){
rides=d.data.sort((a,b)=>new Date(a.date)-new Date(b.date));
render();
lastSync=Date.now();
document.getElementById("last-updated").innerText="Updated "+new Date().toLocaleTimeString();
}
}catch{}
}

function render(){
const container=document.getElementById("rides");
if(rides.length===0){
container.innerHTML="<div class='empty'>No active rides</div>";
return;
}

container.innerHTML=rides.map(r=>{
const percent=(1-r.seats/6)*100;
return `
<div class="card fade">
<div style="display:flex;justify-content:space-between;align-items:center;">
<div>
<div style="font-weight:600">${r.destination}</div>
<div style="font-size:0.85rem;color:var(--muted)">${new Date(r.date).toLocaleDateString()}</div>
</div>
<div style="font-weight:700">$${r.price}</div>
</div>

<div class="capacity">
<div class="capacity-fill" style="width:${percent}%"></div>
</div>

<button onclick="book(${r.id})">Claim Seat (${r.seats} left)</button>
</div>`;
}).join("");
}

async function book(id){
if(!confirm("Confirm seat?"))return;
await fetch(API,{method:"POST",body:JSON.stringify({action:"bookSeat",id,token:session.token})});
loadRides(true);
}

if(session) initApp();

</script>

</body>
</html>
