<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pitt RideShare</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --pitt-navy: #1c2957; --pitt-gold: #cdb87d; --bg: #f3f4f6; --card: #fff; --text: #111827; }
        [data-theme="dark"] { --bg: #030712; --card: #111827; --text: #f9fafb; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 90px; overflow-x: hidden; }
        header { background: var(--pitt-navy); color: #fff; padding: 25px 20px; border-radius: 0 0 25px 25px; position: sticky; top: 0; z-index: 100; }
        .container { max-width: 500px; margin: 20px auto; padding: 0 20px; }
        .bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); display: flex; border-radius: 20px; padding: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 1000; }
        [data-theme="dark"] .bottom-nav { background: rgba(17,24,39,0.9); }
        .nav-item { flex: 1; text-align: center; font-size: 0.75em; font-weight: 700; cursor: pointer; color: #6b7280; }
        .nav-item.active { color: var(--pitt-navy); }
        [data-theme="dark"] .nav-item.active { color: var(--pitt-gold); }
        .ride-card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid rgba(0,0,0,0.05); }
        #map-container { height: 350px; border-radius: 20px; margin-bottom: 20px; }
        .map-hidden { position: absolute; left: -9999px; visibility: hidden; }
        input, select, button { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #e5e7eb; font-family: inherit; font-size: 1em; margin-bottom: 10px; }
        button { background: var(--pitt-navy); color: #fff; border: none; font-weight: 700; cursor: pointer; }
        .sync-spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 1s linear infinite; display: none; margin-left: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media screen and (max-height: 500px) { .bottom-nav { display: none !important; } }
    </style>
</head>
<body>

<div id="ptr" style="display:none; text-align:center; padding:10px; font-weight:700;">↻ Release to sync...</div>

<header>
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2 style="margin:0; font-weight:800;">Pitt RideShare <div id="sync" class="sync-spinner"></div></h2>
        <button onclick="logout()" style="width:auto; padding:8px 15px; font-size:0.8em;">Exit</button>
    </div>
</header>

<div class="container">
    <div id="auth-view" class="view">
        <input type="text" id="email" placeholder="Pitt Email">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="auth('login')">Sign In</button>
        <button onclick="toggleReg()" style="background:none; color:var(--text); font-size:0.8em;">New? Create Account</button>
    </div>

    <div id="rider-view" class="view" style="display:none;">
        <div id="map-container" class="map-hidden"></div>
        <button onclick="toggleMap()" style="background:var(--pitt-gold); color:#000; margin-bottom:20px;">📍 Toggle Map View</button>
        <div id="list"></div>
    </div>
</div>

<nav class="bottom-nav" id="menu" style="display:none;">
    <div class="nav-item active" onclick="tab('rider')">🔍 Search</div>
    <div class="nav-item" onclick="tab('driver')">🚗 Post</div>
    <div class="nav-item" onclick="tab('trips')">🎟️ My Trips</div>
    <div class="nav-item" onclick="tab('admin')" id="adm-tab" style="display:none;">⚙️ Admin</div>
</nav>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const API = "YOUR_APPS_SCRIPT_URL_HERE";
    let user = JSON.parse(localStorage.getItem('pitt_session') || "null");
    let cached = [];
    let map, isMap = false;

    // FIX 9: Optimized Silent Sync
    async function sync() {
        if(!user) return;
        document.getElementById('sync').style.display='inline-block';
        try {
            const res = await fetch(API, {method:'POST', body:JSON.stringify({action:'getRides', token:user.token, email:user.email})});
            const d = await res.json();
            if(d.status==='success') {
                cached = d.data;
                localStorage.setItem('pitt_data', JSON.stringify(cached));
                render();
            }
        } catch(e){}
        document.getElementById('sync').style.display='none';
    }

    // FIX 4: Map Rendering Fix
    function toggleMap() {
        isMap = !isMap;
        const m = document.getElementById('map-container');
        if(isMap) {
            m.classList.remove('map-hidden');
            if(!map) {
                map = L.map('map-container').setView([40.44,-79.99], 7);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
            }
            setTimeout(() => map.invalidateSize(), 200);
        } else m.classList.add('map-hidden');
    }

    // FIX 8: Optimistic Booking
    async function book(id) {
        let r = cached.find(x => x.id == id);
        if(r) { r.seats--; render(); } // Instant UI update
        const res = await fetch(API, {method:'POST', body:JSON.stringify({action:'bookSeat', id, token:user.token, email:user.email})});
        const d = await res.json();
        if(d.status !== 'success') { alert(d.message); sync(); }
    }

    // Pull to Refresh
    let ts = 0;
    window.addEventListener('touchstart', e => ts = e.touches[0].clientY);
    window.addEventListener('touchend', e => {
        if(window.scrollY === 0 && e.changedTouches[0].clientY - ts > 100) {
            document.getElementById('ptr').style.display='block';
            setTimeout(() => { document.getElementById('ptr').style.display='none'; sync(); }, 800);
        }
    });

    function render() {
        const div = document.getElementById('list');
        div.innerHTML = cached.map(r => `
            <div class="ride-card">
                <div style="display:flex; justify-content:space-between">
                    <b>${r.destination}</b>
                    <span style="color:green; font-weight:800">$${r.price}</span>
                </div>
                <div style="font-size:0.8em; margin:10px 0">${r.seats} seats • ${r.name}</div>
                <button onclick="book(${r.id})">Claim Seat</button>
            </div>
        `).join('');
    }

    if(user) { 
        document.getElementById('auth-view').style.display='none';
        document.getElementById('rider-view').style.display='block';
        document.getElementById('menu').style.display='flex';
        sync();
    }
</script>
</body>
</html>
