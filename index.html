<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pitt RideShare</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #1c2957; --gold: #cdb87d; --bg: #f3f4f6; --card: #fff; --text: #111827; --muted: #6b7280; }
        [data-theme="dark"] { --bg: #030712; --card: #111827; --text: #f9fafb; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; transition: 0.3s ease; }
        header { background: var(--navy); color: #fff; padding: 30px 20px; border-radius: 0 0 30px 30px; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .container { max-width: 500px; margin: 20px auto; padding: 0 20px; }
        .bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); display: none; border-radius: 24px; padding: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); z-index: 1000; border: 1px solid rgba(255,255,255,0.2); }
        [data-theme="dark"] .bottom-nav { background: rgba(17,24,39,0.9); border-color: rgba(255,255,255,0.05); }
        .nav-item { flex: 1; text-align: center; font-size: 0.75em; font-weight: 700; cursor: pointer; color: var(--muted); transition: 0.2s; }
        .nav-item.active { color: var(--navy); }
        [data-theme="dark"] .nav-item.active { color: var(--gold); }
        .view { display: none; animation: fadeIn 0.3s; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .ride-card { background: var(--card); border-radius: 24px; padding: 24px; margin-bottom: 20px; border: 1px solid rgba(0,0,0,0.05); transition: 0.2s; position: relative; }
        .ride-card:active { transform: scale(0.98); }
        #map-container { height: 350px; border-radius: 24px; margin-bottom: 24px; border: 2px solid var(--navy); }
        .map-hidden { position: absolute; left: -9999px; visibility: hidden; }
        input, select, textarea, button { width: 100%; padding: 16px; border-radius: 16px; border: 2px solid #e5e7eb; font-family: inherit; font-size: 1em; margin-bottom: 12px; box-sizing: border-box; transition: 0.2s; }
        input:focus, select:focus { border-color: var(--gold); outline: none; }
        button { background: var(--navy); color: #fff; border: none; font-weight: 800; cursor: pointer; box-shadow: 0 4px 15px rgba(28,41,87,0.2); }
        .badge { display: inline-block; padding: 6px 12px; border-radius: 10px; font-size: 0.75em; font-weight: 700; background: var(--bg); margin-right: 5px; }
        .sync-spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: var(--gold); border-radius: 50%; animation: spin 1s linear infinite; display: none; margin-left: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media screen and (max-height: 500px) { .bottom-nav { display: none !important; } }
    </style>
</head>
<body>

<div id="ptr" style="display:none; text-align:center; padding:15px; font-weight:800; color:var(--muted);">↻ Release to Sync...</div>

<header>
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2 style="margin:0; font-weight:800; letter-spacing:-1px;">Pitt RideShare <div id="sync" class="sync-spinner"></div></h2>
        <button onclick="logout()" style="width:auto; padding:8px 15px; font-size:0.8em; margin:0;">Exit</button>
    </div>
</header>

<div class="container" id="main">
    <div id="auth-view" class="view active">
        <h3 style="text-align:center;">Student Entry</h3>
        <div id="reg-box" style="display:none;">
            <input type="text" id="reg-name" placeholder="Full Name">
            <select id="reg-gender"><option value="" disabled selected>Gender</option><option value="Female">Female</option><option value="Male">Male</option><option value="Other">Other</option></select>
        </div>
        <input type="text" id="email" placeholder="Pitt Email">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="submitAuth()" id="auth-btn">Sign In</button>
        <p onclick="toggleReg()" id="reg-toggle" style="text-align:center; font-size:0.85em; cursor:pointer;">New? Create Account</p>
    </div>

    <div id="rider-view" class="view">
        <div id="map-container" class="map-hidden"></div>
        <button onclick="toggleMap()" style="background:var(--gold); color:#000;">📍 Toggle Map View</button>
        <input type="text" id="search" placeholder="Search destinations or stops..." oninput="render()">
        <div id="list"></div>
    </div>

    <div id="driver-view" class="view">
        <h3>Offer a Ride</h3>
        <input type="text" id="p-dest" placeholder="Final Destination">
        <input type="text" id="p-stops" placeholder="Stops (e.g. Harrisburg, Philly)">
        <input type="date" id="p-date">
        <div style="display:flex; gap:10px;"><input type="number" id="p-seats" placeholder="Seats"><input type="number" id="p-price" placeholder="$ Price"></div>
        <select id="p-affinity"><option value="Everyone">Everyone</option><option value="Women Only">Women Only</option></select>
        <textarea id="p-notes" placeholder="Departure time, meeting spot..."></textarea>
        <button onclick="postRide()" class="primary-bg">Post Ride</button>
    </div>

    <div id="trips-view" class="view"><div id="trips-list"></div></div>

    <div id="profile-view" class="view">
        <h3>My Profile</h3>
        <input type="text" id="prof-name" readonly>
        <textarea id="prof-bio" placeholder="Add a short bio..."></textarea>
        <button onclick="saveProfile()">Update Bio</button>
    </div>

    <div id="admin-view" class="view">
        <h3>Analytics</h3>
        <div id="stats">Loading...</div>
    </div>
</div>

<nav class="bottom-nav" id="menu">
    <div class="nav-item active" onclick="switchTab('rider')">🔍 Search</div>
    <div class="nav-item" onclick="switchTab('driver')">🚗 Post</div>
    <div class="nav-item" onclick="switchTab('trips')">🎟️ Trips</div>
    <div class="nav-item" onclick="switchTab('profile')">👤 Profile</div>
    <div class="nav-item" id="adm-tab" style="display:none;" onclick="switchTab('admin')">⚙️ Admin</div>
</nav>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const API = "https://script.google.com/macros/s/AKfycbwQ5S9FsP2sGV6Y1mKJJHOdspAhw9r7bP4fTy1I0RXhyGZj_Mxg_h5CyDt6UPKxeLjl/exec";
    let session = JSON.parse(localStorage.getItem('pitt_session') || "null");
    let cached = [];
    let map, isMap = false, isReg = false;

    async function silentSync() {
        if(!session) return;
        document.getElementById('sync').style.display='inline-block';
        try {
            const res = await fetch(API, {method:'POST', body:JSON.stringify({action:'getRides', token:session.token, email:session.email})});
            const d = await res.json();
            if(d.status==='success') { cached = d.data; render(); }
        } catch(e){}
        document.getElementById('sync').style.display='none';
    }

    function render() {
        const query = document.getElementById('search').value.toLowerCase();
        const list = document.getElementById('list');
        const filtered = cached.filter(r => r.destination.toLowerCase().includes(query) || r.waypoints.toLowerCase().includes(query));
        
        list.innerHTML = filtered.map(r => `
            <div class="ride-card">
                <div style="display:flex; justify-content:space-between; align-items:start;">
                    <div>
                        <h3 style="margin:0;">${r.destination}</h3>
                        <p style="font-size:0.8em; color:var(--muted); margin:4px 0;">📍 ${r.waypoints || 'Direct'}</p>
                    </div>
                    <b style="color:var(--navy); font-size:1.4em;">$${r.price}</b>
                </div>
                <div style="margin:15px 0;">
                    <span class="badge">📅 ${new Date(r.date).toLocaleDateString()}</span>
                    <span class="badge">👤 ${r.name}</span>
                    ${r.affinity === 'Women Only' ? '<span class="badge" style="color:deeppink;">💜 Women Only</span>' : ''}
                </div>
                <button onclick="book(${r.id})">${r.seats} Seats Left</button>
            </div>
        `).join('');
    }

    async function book(id) {
        if(!confirm("Claim a seat?")) return;
        let r = cached.find(x => x.id == id);
        if(r) { r.seats--; render(); } // Optimistic
        const res = await fetch(API, {method:'POST', body:JSON.stringify({action:'bookSeat', id, token:session.token, email:session.email})});
        const d = await res.json();
        if(d.status !== 'success') { alert(d.message); silentSync(); }
    }

    function toggleMap() {
        isMap = !isMap;
        const m = document.getElementById('map-container');
        if(isMap) {
            m.classList.remove('map-hidden');
            if(!map) {
                map = L.map('map-container').setView([40.44,-79.99], 7);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
            }
            setTimeout(() => map.invalidateSize(), 200);
        } else m.classList.add('map-hidden');
    }

    function switchTab(t) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(t+'-view').classList.add('active');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        event.currentTarget.classList.add('active');
        if(t==='rider') silentSync();
        if(t==='profile') loadProfile();
    }

    async function submitAuth() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        const payload = { action: isReg ? 'register' : 'login', email, password: pass };
        if(isReg) { payload.name = document.getElementById('reg-name').value; payload.gender = document.getElementById('reg-gender').value; }
        
        const res = await fetch(API, {method:'POST', body:JSON.stringify(payload)});
        const d = await res.json();
        if(d.status === 'success' || d.status === 'admin_success') {
            session = { email: d.status === 'admin_success' ? 'test2' : email, token: d.token };
            localStorage.setItem('pitt_session', JSON.stringify(session));
            location.reload();
        } else alert(d.message);
    }

    function toggleReg() { isReg = !isReg; document.getElementById('reg-box').style.display = isReg ? 'block' : 'none'; document.getElementById('auth-btn').innerText = isReg ? 'Create Account' : 'Sign In'; }

    function logout() { localStorage.clear(); location.reload(); }

    if(session) {
        document.getElementById('auth-view').style.display = 'none';
        document.getElementById('rider-view').classList.add('active');
        document.getElementById('menu').style.display = 'flex';
        if(session.email === 'test2') document.getElementById('adm-tab').style.display = 'block';
        silentSync();
    }
</script>
</body>
</html>
